services:
  app:
    image: ghcr.io/lesomnus/vend:${REVISION:-local}
    command: [greet, lesomnus]

    network_mode: host
    privileged: true

    volumes:
      - ./vend.yaml:/vend.yaml:ro

    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 64M
        reservations:
          cpus: "2"
          memory: 32M
